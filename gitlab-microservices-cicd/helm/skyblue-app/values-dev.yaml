environment: development
replicaCount: 1

image:
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  nodePort: 30000

services:
  gateway:
    replicaCount: 1
    env:
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    healthCheck:
      liveness:
        initialDelaySeconds: 30  
      readiness:
        initialDelaySeconds: 5
  users:
    replicaCount: 1
    env:
      ENV: "development"
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  orders:
    replicaCount: 1
    env:
      ENV: "development"
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

logLevel: DEBUG

config:
  DEBUG: "true"
  ENVIRONMENT: "development"
  LOG_LEVEL: "DEBUG"

autoscaling:
  enabled: false